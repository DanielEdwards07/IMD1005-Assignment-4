<!--Menu Page-->

<!DOCTYPE html>
<html lang="en">
	<head>
        <title>Steakhouse Menu Page</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/png" href="Assets/Icon.png">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>

    <body>

        <!--Hamburger Menu-->
        <div class="hamburger" onclick="toggleMenu()">
            <div></div>
            <div></div>
            <div></div>
        </div>

        <!--Top Bar with all the options-->
        <nav class="navbar">
            <img src="Assets/logo.png" height="70" alt="Logo">
            <div>
                <a href="index.html">Home</a>
			    <a href="menu.html" style="color: #FAB85B;">Order Online</a>
			    <a href="aboutUs.html">About us</a>
                <a href="reserve.html">Reserve</a>
                <a href="career.html">Careers</a>
            </div>
		</nav>
        <!--End of top bar-->

        <!--Back to top Button-->
        <div class="backToTop" onclick="scrollToTop()">
            <img src="Assets/arrowUp.png" height="50" width="50">
        </div>

        <div class="menuTitle"><h1>Our Menu</h1></div>

        <button id="cartOpen">Cart (0)</button>

        <div id="cartBox">
            <h2>Your Cart</h2>
            <div id="cartItems"></div>
            <h3 id="cartTotal">Total: $0.00</h3>
            <button id="cartClose">Close</button><button id="checkOut">Check Out</button>
        </div>

        <main class="container" id="foodContainer">
        </main>

        <!--Footer-->
        <footer class="footerBar">
            <div>
                <h1 class="footerText">Great food makes a great life</h1>
                <h2 class="footerText">The world's best steakhouse</h2>
            </div>
            <h3 class="footerText">© 2026 All Rights Reserved</h3>

        </footer>
        <!-- End of Footer-->

        <script src="script.js"></script>

    </body>
</html>
